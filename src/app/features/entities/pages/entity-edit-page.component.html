<div class="nx-product-page nx-entity-form-page">
  <header class="nx-entity-form-page__header">
    <button mat-button type="button" (click)="cancel()" class="nx-entity-form-page__back">
      <mat-icon>arrow_back</mat-icon>
      Back
    </button>
    <h1 class="nx-page-title">Edit entity</h1>
    <p class="nx-page-subtitle">Update fields and save. Sample data replaces the form only — it does not save.</p>
  </header>

  <form class="nx-entity-form-page__form" (ngSubmit)="submit()">
    <mat-card appearance="outlined" class="nx-product-surface nx-entity-form-page__fields-card">
      <mat-card-content>
        <nx-entity-form-fields [form]="form" />
      </mat-card-content>
    </mat-card>

    <mat-card appearance="outlined" class="nx-product-surface nx-entity-form-page__actions-card">
      <mat-card-content class="nx-entity-form-page__actions">
        @if (store.errorMessage()) {
          <p class="nx-entity-form-page__error" role="alert">{{ store.errorMessage() }}</p>
        }
        <div class="nx-entity-form-page__buttons">
          <button mat-button type="button" (click)="cancel()">Cancel</button>
          <div class="nx-entity-form-page__buttons-end">
            <button mat-stroked-button type="button" (click)="applySample()">Generate sample data</button>
            <button mat-flat-button color="primary" type="submit" [disabled]="store.loading()">
              {{ store.loading() ? 'Saving…' : 'Save changes' }}
            </button>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </form>
</div>
