<div class="nx-entity-catalog-table__wrap">
  <table mat-table [dataSource]="rows()" class="nx-data-table nx-entity-catalog-table__table">
    <ng-container matColumnDef="favorite">
      <th mat-header-cell *matHeaderCellDef class="nx-data-table__col-fav"></th>
      <td
        mat-cell
        *matCellDef="let row"
        class="nx-data-table__col-fav"
        (click)="$event.stopPropagation()"
      >
        <button
          mat-icon-button
          type="button"
          (click)="onFavoriteClick(row.id, $event)"
          [attr.aria-label]="
            favoriteStarFilled() || favorites.isFavorite(row.id)
              ? 'Remove from favorites'
              : 'Add to favorites'
          "
        >
          <mat-icon
            [class.nx-data-table__star--on]="favoriteStarFilled() || favorites.isFavorite(row.id)"
          >
            {{
              favoriteStarFilled() || favorites.isFavorite(row.id) ? 'star' : 'star_border'
            }}
          </mat-icon>
        </button>
      </td>
    </ng-container>
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let row" class="nx-data-table__cell-name">{{ row.name }}</td>
    </ng-container>
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let row" class="nx-data-table__cell-status">
        <nx-status-badge
          [label]="formatLabel(row.status)"
          [tone]="statusBadgeTone(row.status)"
        />
      </td>
    </ng-container>
    <ng-container matColumnDef="category">
      <th mat-header-cell *matHeaderCellDef>Category</th>
      <td mat-cell *matCellDef="let row" class="nx-data-table__cell-muted">
        {{ formatLabel(row.category) }}
      </td>
    </ng-container>
    <ng-container matColumnDef="priority">
      <th mat-header-cell *matHeaderCellDef>Priority</th>
      <td mat-cell *matCellDef="let row" class="nx-data-table__cell-priority">
        {{ formatLabel(row.priority) }}
      </td>
    </ng-container>
    <ng-container matColumnDef="owner">
      <th mat-header-cell *matHeaderCellDef>Owner</th>
      <td mat-cell *matCellDef="let row">{{ row.owner }}</td>
    </ng-container>
    <ng-container matColumnDef="updatedAt">
      <th mat-header-cell *matHeaderCellDef>Updated</th>
      <td mat-cell *matCellDef="let row" class="nx-data-table__cell-date">
        {{ row.updatedAt | date: 'medium' }}
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr
      mat-row
      *matRowDef="let row; columns: columns"
      class="nx-data-table__row"
      (click)="onRowClick(row.id)"
      (keydown.enter)="onRowClick(row.id)"
      tabindex="0"
      [attr.aria-label]="'Edit ' + row.name"
    ></tr>
  </table>
</div>
